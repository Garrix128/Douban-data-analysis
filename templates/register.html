<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>注册 - 电影数据分析系统</title>
    <link href="/static/css/mongodb.css" rel="stylesheet"/>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>创建账户</h2>
                <p>注册电影数据分析系统账号</p>
            </div>
            <div class="auth-card-body">
                <form method="post" action="/register">
                    <div class="form-group">
                        <label class="form-label" for="inputFirstName">用户名</label>
                        <input class="form-input" name="username" id="inputFirstName" type="text" placeholder="请输入用户名"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="inputEmail">密码</label>
                        <input class="form-input" id="inputEmail" name="password" type="password" placeholder="请输入密码"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="inputPassword">确认密码</label>
                        <input class="form-input" id="inputPassword" name="passwordCheked" type="password" placeholder="确认密码"/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">立即注册</button>
                </form>
            </div>
            <div class="auth-card-footer">
                <a href="/login">已有账号？去登录</a>
            </div>
        </div>
    </div>
</body>
</html>
