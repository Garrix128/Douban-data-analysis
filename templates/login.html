<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>登录 - 电影数据分析系统</title>
    <link href="/static/css/mongodb.css" rel="stylesheet"/>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>欢迎回来</h2>
                <p>登录您的电影数据分析系统账号</p>
            </div>
            <div class="auth-card-body">
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="inputUsername">用户名</label>
                        <input class="form-input" id="inputUsername" name="username" type="text" placeholder="请输入用户名"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="inputPassword">密码</label>
                        <input class="form-input" id="inputPassword" name="password" type="password" placeholder="请输入密码"/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">登录</button>
                </form>
            </div>
            <div class="auth-card-footer">
                <a href="/register">还没有账号？立即注册</a>
            </div>
        </div>
    </div>
</body>
</html>
