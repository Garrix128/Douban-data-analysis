{% extends "base.html" %}
{% block title %}自定义词云{% endblock %}
{% block page_name %}自定义词云图{% endblock %}
{% block content %}
<div class="breadcrumb-bar">
    <span class="current">自定义词云图</span>
</div>
<h2 class="page-title">自定义词云图</h2>

<div class="search-bar">
    <form style="display: flex; gap: 12px; width: 100%;" method="post" action="/comments_c">
        <input name="searchIpt" type="text" class="search-input" placeholder="请输入电影名字...">
        <button type="submit" class="btn btn-primary">生成词云图</button>
    </form>
</div>

<div class="wordcloud-container">
    <img src="/static/images/comments.png" alt="评论词云图">
</div>
{% endblock %}
