{% extends "base.html" %}
{% block title %}演员信息{% endblock %}
{% block page_name %}演员与导演分析{% endblock %}
{% block content %}
<div class="breadcrumb-bar">
    <span class="current">演员与导演分析</span>
</div>
<h2 class="page-title">演员与导演分析</h2>

<div class="actor-chart-section">
    <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        </svg>
        导演作品数量前20
    </h3>
    <div id="mainOne" style="width: 100%;height: 450px;"></div>
</div>

<div class="actor-chart-section">
    <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        演员参演排名前20
    </h3>
    <div id="mainTwo" style="width: 100%;height: 450px;"></div>
</div>
{% endblock %}
{% block scriptcontent %}
<script>
  var chartDom = document.getElementById('mainOne')
  var myChart = echarts.init(chartDom)
  var option
  option = {
    title: {
      text: '',
      left: 'center',
      textStyle: {
        color: '#2f7add',
        fontSize: 16,
      },
    },
    tooltip: {
      trigger: 'axis',
      textStyle: {
        color: '#000',
      },
      axisPointer: {
        type: 'cross',
      },
    },
    legend: {
      orient: 'vertical',
      left: 'right',
    },
    xAxis: {
      type: 'value',
      name: '数量',
    },
    yAxis: {
      type: 'category',
      data: {{ x | safe }},
      name: '导演',
    },
    dataZoom: {
      type: 'inside',
      start: 0,
      orient: 'vertical',
    },
    series: [
      {
        name: '作品数量',
        type: 'bar',
        data:{{ y | safe }},
        showBackground: true,
        backgroundStyle: {
          color: 'rgba(212,192,220,0.5)',
        },
        itemStyle: {
          color: 'rgba(26,66,152,0.8)',
        },
        animationDuration: 5000,
        animationEasing: 'cubicOut',
      }],
  }
  option && myChart.setOption(option)
</script>

<script>
  var chartDom = document.getElementById('mainTwo')
  var myChart = echarts.init(chartDom)
  var option
  option = {
    title: {
      text: '',
      left: 'center',
      textStyle: {
        color: '#2f7add',
        fontSize: 16,
      },
    },
    tooltip: {
      trigger: 'axis',
      textStyle: {
        color: '#000',
      },
    },
    legend: {
      orient: 'vertical',
      left: 'right',
    },
    xAxis: {
      type: 'category',
      data: {{ x1 | safe }},
      boundaryGap: false,
      name: '演员',
    },
    yAxis: {
      type: 'value',
      name: '数量',
    },
    series: [
      {
        name: '作品数量',
        type: 'line',
        data:{{ y1 | safe }},
        areaStyle: {
          color: 'rgba(136,172,216,0.5)',
        },
        lineStyle: {
          color: 'rgba(22,113,24,0.5)',
        },
        itemStyle: {
          color: 'rgba(62,22,184,0.5)',
        },
        animationDuration: 5000,
        animationEasing: 'elasticOut',
      }],
  }
  option && myChart.setOption(option)
</script>
{% endblock %}
