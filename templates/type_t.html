{% extends "base.html" %}
{% block title %}类型信息{% endblock %}
{% block page_name %}类型分析{% endblock %}
{% block content %}
<div class="page-title">
    <h2><i class="fas fa-chart-pie me-2"></i>类型分析</h2>
    <p>电影类型分布统计</p>
</div>
<div class="chart-full">
    <div class="chart-full-header">
        <h3>电影类型饼图</h3>
    </div>
    <div class="chart-full-body">
        <div id="mainOne" style="width: 100%;height: 650px;"></div>
    </div>
</div>
<div class="top10-grid" id="top10Grid">
</div>
{% endblock %}
{% block scriptcontent %}
<script>
  // 电影类型饼图
  var chartDom = document.getElementById('mainOne')
  var myChart = echarts.init(chartDom)
  var option
  option = {
    //标题
    title: {
      text: '',
      left: 'center',
      textStyle: {
        color: '#982cb6',
        fontSize: 16,
      },
    },
    //提示框
    tooltip: {
      trigger: 'item',
      textStyle: {
        color: '#83a843',
      },
    },
    //图例
    legend: {
      type: 'plain',
      orient: 'horizontal',
      left: 'center',
      icon: 'pin',
      itemWidth: 25,
      itemHeight: 25,
      textStyle: {
        fontSize: 18,
        color: '#00f',
      },
    },
    //系列列表
    series: [
      {
        name: '电影类型',
        type: 'pie',
        radius: ['40%', '60%'],
        data: {{ top10Data | safe }},
        label: {
          show: false,
          position:'center'
        },
        labelLine: {
          lineStyle: {
            color: '#00f',
          },
        },
        itemStyle: {
          borderRadius: 10,
          borderColor: '#000',
          borderWidth: 2,
        },
        emphasis: {
          label:{
            show: true,
            fontSize: 40,
            fontWeight: 'bold',
            textStyle: {
              color: '#00f',
            }
          }
        },
        //设置动画效果
        //animationType:'scale',
        animationDuration: 5000,
        animationEasing: 'elasticIn',
      }],
    //自定义颜色
    color: ['#43cc49', '#1e3bd1', '#e4644d', '#a0ea08'],
  }
  option && myChart.setOption(option)
</script>

<script>
  var top10Data = {{ top10Data | safe }};
  var grid = document.getElementById('top10Grid');
  if (grid && top10Data) {
    var sorted = top10Data.slice().sort(function(a, b) {
      return b.value - a.value;
    });
    sorted.forEach(function(item, index) {
      var el = document.createElement('div');
      el.className = 'top10-item';
      el.innerHTML = '<div class="top10-rank">' + (index + 1) + '</div>' +
        '<div class="top10-info"><strong>' + item.name + '</strong><span>' + item.value + ' 部</span></div>';
      grid.appendChild(el);
    });
  }
</script>
{% endblock %}
